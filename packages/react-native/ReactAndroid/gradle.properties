VERSION_NAME=0.73.2-0

# react.internal.publishingGroup=com.facebook.react
# For TV use this group
react.internal.publishingGroup=io.github.react-native-tvos

android.useAndroidX=true
android.enableJetifier=true

# We want to have more fine grained control on the Java version for
# ReactAndroid, therefore we disable RGNP Java version alignment mechanism
react.internal.disableJavaVersionAlignment=true

# Signing configuration, see `publish.gradle` for more details
signing.gnupg.executable=gpg
signing.gnupg.useLegacyGpg=true
signing.gnupg.keyName= # run `gpg -K` and paste the `sec` key (40 characters)
signing.keyId= # run `gpg -K` and paste the `sec` key (40 characters)
signing.secretKeyRingFile="~/.gnupg/secring.gpg"  # run `gpg --keyring secring.gpg --export-secret-keys > ~/.gnupg/secring.gpg`
